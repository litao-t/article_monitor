<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Solid Earth Literature Monitor</title>
    <link rel="stylesheet" href="assets/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-inner">
        <a class="site-title" href="#latest" data-section-link="latest">Solid Earth Literature Brief</a>
        <nav class="topbar-nav" aria-label="Report sections">
          <a href="#latest" data-section-link="latest" class="active">Latest Issue</a>
          <a href="#search" data-section-link="search">Search Articles</a>
          <a href="#archive" data-section-link="archive">Archive</a>
        </nav>
      </div>
    </header>

    <main>
      <section id="latest" class="latest-section content-section active" aria-labelledby="latest-title">
        <div class="latest-head">
          <div>
            <p class="section-kicker">Latest Issue</p>
            <h2 id="latest-title"></h2>
            <p id="latest-meta" class="meta-line"></p>
          </div>
          <div id="latest-count" class="count-box"></div>
        </div>

        <div id="latest-summary" class="summary-grid"></div>
        <div id="latest-list" class="article-list"></div>
      </section>

      <section id="search" class="search-section content-section" aria-labelledby="search-title">
        <div class="section-title-row">
          <div>
            <p class="section-kicker">Search</p>
            <h2 id="search-title">Search Articles</h2>
          </div>
          <span id="search-count" class="small-note"></span>
        </div>

        <div class="controls" aria-label="Search recorded articles">
          <label class="search-box">
            <span>Keyword</span>
            <input id="search-input" type="search" placeholder="Title, author, method, region, key point" />
          </label>
          <div id="interest-filters" class="interest-filters" aria-label="Interest keyword filter"></div>
        </div>

        <div id="search-results" class="article-list compact-list"></div>
      </section>

      <section id="archive" class="archive-section content-section" aria-labelledby="archive-title">
        <div class="section-title-row">
          <div>
            <p class="section-kicker">Archive</p>
            <h2 id="archive-title">Previous Reports</h2>
          </div>
          <span id="archive-count" class="small-note"></span>
        </div>
        <div id="archive-list" class="archive-list"></div>
      </section>

    </main>

    <script src="assets/app.js"></script>
  </body>
</html>

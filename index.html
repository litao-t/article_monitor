<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GRL Solid Earth Reports</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">Geophysical Research Letters</p>
        <h1>Solid Earth Article Brief</h1>
      </div>
      <a class="source-link" href="https://agupubs.onlinelibrary.wiley.com/toc/19448007/current" target="_blank" rel="noreferrer">
        Current GRL Issue
      </a>
    </header>

    <main>
      <section class="search-section" aria-labelledby="search-title">
        <div class="section-title-row">
          <div>
            <p class="section-kicker">Search</p>
            <h2 id="search-title">Search Articles</h2>
          </div>
          <span id="search-count" class="small-note"></span>
        </div>

        <div class="controls" aria-label="Search recorded articles">
          <label class="search-box">
            <span>Keyword</span>
            <input id="search-input" type="search" placeholder="Title, author, method, region, key point" />
          </label>
          <div id="interest-filters" class="interest-filters" aria-label="Interest keyword filter"></div>
        </div>

        <div id="search-results" class="article-list compact-list"></div>
      </section>

      <section class="latest-section" aria-labelledby="latest-title">
        <div class="latest-head">
          <div>
            <p class="section-kicker">Latest Issue</p>
            <h2 id="latest-title"></h2>
            <p id="latest-meta" class="meta-line"></p>
          </div>
          <div id="latest-count" class="count-box"></div>
        </div>

        <div id="latest-summary" class="summary-grid"></div>
        <div id="latest-list" class="article-list"></div>
      </section>

      <section class="archive-section" aria-labelledby="archive-title">
        <div class="section-title-row">
          <div>
            <p class="section-kicker">Archive</p>
            <h2 id="archive-title">Previous Reports</h2>
          </div>
          <span id="archive-count" class="small-note"></span>
        </div>
        <div id="archive-list" class="archive-list"></div>
      </section>

      <section id="report-detail" class="detail-section" aria-labelledby="detail-title" hidden>
        <div class="detail-head">
          <div>
            <p class="section-kicker">Report Detail</p>
            <h2 id="detail-title"></h2>
            <p id="detail-meta" class="meta-line"></p>
          </div>
          <div class="detail-actions">
            <a id="detail-source" class="article-link" href="#" target="_blank" rel="noreferrer">Issue Page</a>
            <a class="article-link" href="#archive-title">Back</a>
          </div>
        </div>

        <div id="detail-summary" class="summary-grid"></div>
        <div id="detail-list" class="article-list"></div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>

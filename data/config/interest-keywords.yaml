version: project-v1

rules:
  explicit_tags_first: true
  related_terms_only_for_untagged_articles: true
  default_search_results_visible: false
  article_mappings_source: "assets/app.js reports[*].articles[*].interestTags"

interest_keywords:
  - label: Seismology
    related_terms:
      - seismic
      - seismology
      - earthquake
      - receiver function
      - waveform inversion
      - aftershock
      - ambient noise
      - DAS
      - tomoDD
      - Vp/Vs
      - Moho

  - label: Fault Damage Zone
    related_terms:
      - fault zone
      - fault gouge
      - fault rock
      - friction
      - shearing
      - rupture zone
      - damage zone
      - mafic intrusion
      - permeability

  - label: Crustal Deformation
    related_terms:
      - crustal deformation
      - deformation
      - InSAR
      - creep
      - slip
      - rift
      - extension
      - strain
      - uplift
      - subsidence
